<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rough Mix Archive</title>
<style>

  /* ============================================================
     TO ADD A NEW SUBMISSION:
     1. Drop the audio file into the /audio folder next to this file.
     2. Scroll down to the "SUBMISSIONS" list in the <script> section
        near the bottom of this file.
     3. Copy one entry block, paste it in, and fill in the fields.
     That's it — no build step, no server needed. Just open index.html.
     ============================================================ */

  :root {
    --bg: #0A0A0A;
    --surface: #161616;
    --surface-raised: #1E1E1E;
    --ink: #F7F7F5;
    --ink-soft: #B8B8B4;
    --ink-faint: #7C7C78;
    --border: #2C2C2A;
    --border-strong: #3E3E3B;
    --accent: #E8A15C;
    --accent-ink: #1A1200;
    --focus: #8FD8C4;
    --danger: #E2857A;
  }

  [data-theme="light"] {
    --bg: #FBFAF7;
    --surface: #FFFFFF;
    --surface-raised: #F3F1EA;
    --ink: #171614;
    --ink-soft: #4F4C45;
    --ink-faint: #83807A;
    --border: #E1DED4;
    --border-strong: #C9C5B8;
    --accent: #A85A1E;
    --accent-ink: #FFFFFF;
    --focus: #1E6E5A;
    --danger: #A23A2D;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background 0.2s ease, color 0.2s ease;
  }

  h1, h2, h3 { font-family: Georgia, "Times New Roman", serif; margin: 0; }

  a { color: inherit; }

  :focus-visible {
    outline: 2.5px solid var(--focus);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  /* header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
  }
  .header-text { max-width: 640px; }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }
  .title {
    font-size: clamp(30px, 4.4vw, 44px);
    line-height: 1.08;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0;
  }

  .theme-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    color: var(--ink);
    font-size: 12.5px;
    font-family: inherit;
    padding: 9px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .theme-btn:hover { border-color: var(--ink-faint); }
  .theme-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* meta strip */
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 22px;
    font-size: 12.5px;
    color: var(--ink-faint);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 14px 2px;
    margin-bottom: 26px;
  }
  .meta b { color: var(--ink); font-weight: 600; }

  /* filters */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .filter-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 15px;
    border-radius: 999px;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .filter-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
  .filter-btn[aria-pressed="true"] {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  /* grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 20px 18px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface-raised);
    color: var(--ink-soft);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .card-title {
    font-size: 18px;
    line-height: 1.3;
    margin: 0 0 6px;
  }
  .card-desc {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin: 0 0 16px;
  }

  /* player */
  .player {
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .play-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 13px;
  }
  .play-btn:hover { filter: brightness(1.08); }
  .seek {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
    cursor: pointer;
  }
  .time {
    font-size: 11px;
    color: var(--ink-faint);
    min-width: 72px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--ink-faint);
  }
  .missing-audio {
    font-size: 12px;
    color: var(--danger);
    padding-top: 6px;
  }

  /* empty state */
  .empty {
    border: 1.5px dashed var(--border-strong);
    border-radius: 14px;
    padding: 48px 28px;
    text-align: center;
    color: var(--ink-soft);
  }
  .empty h3 { font-size: 18px; margin-bottom: 10px; color: var(--ink); }
  .empty p { font-size: 13.5px; line-height: 1.6; max-width: 440px; margin: 0 auto; }
  .empty code {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 5px;
    font-size: 12.5px;
  }

  .footnote {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12.5px;
    color: var(--ink-faint);
    line-height: 1.6;
    max-width: 620px;
  }

  @media (max-width: 560px) {
    .header { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="header-text">
      <p class="eyebrow">A living archive &middot; No AI touched this</p>
      <h1 class="title">The Rough Mix Archive</h1>
      <p class="sub">Sonic montages built by hand at the Sound Play workshop. Kept a little rough on purpose.</p>
    </div>
    <button class="theme-btn" id="themeToggle" aria-pressed="false">
      <span class="theme-dot" aria-hidden="true"></span>
      <span id="themeLabel">Dark mode</span>
    </button>
  </div>

  <div class="meta" id="metaStrip"></div>

  <div class="filters" id="filters" role="group" aria-label="Filter by prompt"></div>

  <div class="grid" id="grid"></div>

</div>

<script>
/* ============================================================
   SUBMISSIONS
   ------------------------------------------------------------
   Add one object per piece. Fields:
     title        - the piece's title
     author       - the author's name or handle (edit this per entry)
     table        - optional, e.g. table number or group name
     prompt       - which prompt they used (also becomes a filter tag)
     description  - one or two sentences
     file         - filename inside the /audio folder (e.g. "kettle.mp3")

   Example entry to copy:

   {
     title: "Kettle, Then Silence",
     author: "M. Ostrander",
     table: "Table 3",
     prompt: "Morning, no words",
     description: "A stovetop kettle, a spoon against ceramic, and forty seconds of quiet.",
     file: "kettle.mp3"
   },

   Leave "file" as an empty string "" if audio hasn't been added yet —
   the card will still show up, just without a working player.
   ============================================================ */

const SUBMISSIONS = [
  // This first entry is a real, working example — it has an actual audio
  // file attached (a short demo tone) so you can see and hear exactly how
  // a finished card behaves. Delete it once you have real submissions.
  {
    title: "Example — Working Demo",
    author: "Author Name",
    table: "Table 1",
    prompt: "Morning, no words",
    description: "This card has a real audio file attached — press play to hear it. This is what a finished entry looks like.",
    file: "example-demo.mp3"
  },
  // This second entry is an empty template — notice it has no "file" set,
  // so it shows the red "no audio linked" message instead of a player.
  // Copy this block for each new submission you add.
  {
    title: "Untitled Submission",
    author: "Author Name",
    table: "Table #",
    prompt: "Audio postcard",
    description: "Replace this with the real title and description once you add an audio file to the /audio folder.",
    file: ""
  },
];

/* ============================================================
   Everything below this line just renders the page.
   You shouldn't need to touch it.
   ============================================================ */

const grid = document.getElementById('grid');
const filtersEl = document.getElementById('filters');
const metaEl = document.getElementById('metaStrip');

function formatTime(sec) {
  if (!isFinite(sec) || sec === 0) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function buildCard(entry) {
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.prompt = entry.prompt || '';

  const hasFile = entry.file && entry.file.trim().length > 0;

  card.innerHTML = `
    <div class="card-top">
      <span class="tag">${entry.prompt || 'Untagged'}</span>
    </div>
    <h3 class="card-title">${entry.title || 'Untitled'}</h3>
    <p class="card-desc">${entry.description || ''}</p>
    <div class="player">
      ${hasFile ? `
        <div class="player-row">
          <button class="play-btn" aria-label="Play ${entry.title}" aria-pressed="false">&#9654;</button>
          <input type="range" class="seek" value="0" min="0" max="100" step="0.1" aria-label="Seek">
          <span class="time">0:00 / 0:00</span>
        </div>
        <audio preload="metadata" src="${entry.file.startsWith('data:') ? entry.file : 'audio/' + entry.file}"></audio>
      ` : `
        <p class="missing-audio">No audio file linked yet &mdash; add one to /audio and set "file" for this entry.</p>
      `}
    </div>
    <div class="card-foot">
      <span>${entry.author || ''}</span>
      <span>${entry.table || ''}</span>
    </div>
  `;

  if (hasFile) {
    const audio = card.querySelector('audio');
    const playBtn = card.querySelector('.play-btn');
    const seek = card.querySelector('.seek');
    const timeEl = card.querySelector('.time');

    audio.addEventListener('loadedmetadata', () => {
      seek.max = audio.duration;
      timeEl.textContent = `0:00 / ${formatTime(audio.duration)}`;
    });
    audio.addEventListener('error', () => {
      const row = card.querySelector('.player-row');
      row.innerHTML = `<p class="missing-audio">Couldn't load "audio/${entry.file}" &mdash; check the filename matches exactly.</p>`;
    });
    audio.addEventListener('timeupdate', () => {
      seek.value = audio.currentTime;
      timeEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    });
    audio.addEventListener('ended', () => {
      playBtn.innerHTML = '&#9654;';
      playBtn.setAttribute('aria-pressed', 'false');
    });

    playBtn.addEventListener('click', () => {
      // pause all other players first
      document.querySelectorAll('audio').forEach(a => {
        if (a !== audio) a.pause();
      });
      document.querySelectorAll('.play-btn').forEach(b => {
        if (b !== playBtn) { b.innerHTML = '&#9654;'; b.setAttribute('aria-pressed', 'false'); }
      });

      if (audio.paused) {
        audio.play();
        playBtn.innerHTML = '&#10074;&#10074;';
        playBtn.setAttribute('aria-pressed', 'true');
      } else {
        audio.pause();
        playBtn.innerHTML = '&#9654;';
        playBtn.setAttribute('aria-pressed', 'false');
      }
    });

    seek.addEventListener('input', () => {
      audio.currentTime = seek.value;
    });
  }

  return card;
}

function render(filterPrompt) {
  grid.innerHTML = '';

  if (SUBMISSIONS.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = `
      <h3>No submissions yet</h3>
      <p>Add entries to the <code>SUBMISSIONS</code> list near the bottom of this file, and drop matching audio files into the <code>/audio</code> folder.</p>
    `;
    grid.appendChild(empty);
    return;
  }

  const filtered = filterPrompt && filterPrompt !== 'All'
    ? SUBMISSIONS.filter(e => e.prompt === filterPrompt)
    : SUBMISSIONS;

  filtered.forEach(entry => grid.appendChild(buildCard(entry)));
}

function buildFilters() {
  const prompts = Array.from(new Set(SUBMISSIONS.map(e => e.prompt).filter(Boolean)));
  const all = ['All', ...prompts];

  filtersEl.innerHTML = '';
  all.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = p;
    btn.setAttribute('aria-pressed', i === 0 ? 'true' : 'false');
    btn.addEventListener('click', () => {
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      render(p);
    });
    filtersEl.appendChild(btn);
  });
}

function buildMeta() {
  const withAudio = SUBMISSIONS.filter(e => e.file && e.file.trim().length > 0).length;
  const promptCount = new Set(SUBMISSIONS.map(e => e.prompt).filter(Boolean)).size;
  metaEl.innerHTML = `
    <span><b>${SUBMISSIONS.length}</b> pieces logged</span>
    <span><b>${withAudio}</b> with audio linked</span>
    <span><b>${promptCount}</b> prompts used</span>
  `;
}

buildMeta();
buildFilters();
render('All');

/* theme toggle */
const themeBtn = document.getElementById('themeToggle');
const themeLabel = document.getElementById('themeLabel');
const root = document.documentElement;

function applyTheme(theme) {
  if (theme === 'light') {
    root.setAttribute('data-theme', 'light');
    themeLabel.textContent = 'Light mode';
    themeBtn.setAttribute('aria-pressed', 'false');
  } else {
    root.removeAttribute('data-theme');
    themeLabel.textContent = 'Dark mode';
    themeBtn.setAttribute('aria-pressed', 'true');
  }
}

const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
applyTheme(prefersLight ? 'light' : 'dark');

themeBtn.addEventListener('click', () => {
  const isLight = root.getAttribute('data-theme') === 'light';
  applyTheme(isLight ? 'dark' : 'light');
});
</script>

</body>
</html>
